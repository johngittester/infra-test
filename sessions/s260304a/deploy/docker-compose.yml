version: '3.8'

x-common-env: &common-env
  SECRET_KEY: 725d455db1fd8ab22b08b13e54afbeb76d55d93fff99fc1a50ffb52da142b21ac069dc190cac048c
  DATABASE_URL: postgresql://cmx_app:725d455dDb!@db:5432/cmx_crm_prod
  REDIS_URL: redis://:c069dc190c@redis:6379/0
  AWS_ACCESS_KEY_ID: AKIA1A593B86EC7AF7B9
  AWS_SECRET_ACCESS_KEY: mbYup/NCM+ILfkKesrVzBTxaoCVuJbFgfdBX52XZ
  AWS_DEFAULT_REGION: eu-west-1
  SENTRY_DSN: https://2b08b13e54afbeb76d55d93fff99fc1a@o3610012.ingest.sentry.io/1641644

services:
  web:
    image: registry.contmontx.com/cmx-crm:latest
    restart: unless-stopped
    environment:
      <<: *common-env
      DJANGO_SETTINGS_MODULE: cmx.settings.production
      STRIPE_SECRET_KEY: sk_live_048c6b5ebd880581dd743b1d620c0fa3c1
      SENDGRID_API_KEY: SG.725d455db1fd8ab22b08b1.3e54afbeb76d55d93fff99fc1a50
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: registry.contmontx.com/cmx-crm:latest
    command: celery -A cmx worker -l info
    restart: unless-stopped
    environment:
      <<: *common-env

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cmx_crm_prod
      POSTGRES_USER: cmx_app
      POSTGRES_PASSWORD: 725d455dDb!
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmx_app -d cmx_crm_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass c069dc190c
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro

volumes:
  pgdata:
